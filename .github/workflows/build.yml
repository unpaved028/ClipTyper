name: Build & Release ClipTyper

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "BUILD_VERSION=$version" >> $env:GITHUB_ENV

      - name: Set fallback version
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          echo "BUILD_VERSION=1.3.0" >> $env:GITHUB_ENV

      # ── Portable: self-contained, settings next to EXE ─────────
      - name: Publish Portable
        run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:Version=${{ env.BUILD_VERSION }} -o ./publish-portable

      - name: Add portable marker
        run: New-Item -Path ./publish-portable/portable.marker -ItemType File -Value "This file marks ClipTyper as running in portable mode.`nSettings are stored next to this executable."

      - name: Rename Portable exe
        run: Rename-Item ./publish-portable/ClipTyper.exe ClipTyper-Portable.exe

      # ── Slim: framework-dependent, settings next to EXE ────────
      - name: Publish Slim
        run: dotnet publish -c Release -r win-x64 --self-contained false /p:PublishSingleFile=true /p:Version=${{ env.BUILD_VERSION }} -o ./publish-slim

      - name: Add portable marker (Slim)
        run: New-Item -Path ./publish-slim/portable.marker -ItemType File -Value "This file marks ClipTyper as running in portable mode.`nSettings are stored next to this executable."

      - name: Rename Slim exe
        run: Rename-Item ./publish-slim/ClipTyper.exe ClipTyper-Slim.exe

      # ── Winget: self-contained, no marker (installed mode) ─────
      - name: Publish Winget
        run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:Version=${{ env.BUILD_VERSION }} -o ./publish-winget

      # No portable.marker → installed mode (settings in %AppData%, autostart, shortcuts)

      # ── Upload Artifacts ───────────────────────────────────────
      - name: Upload Portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipTyper-Portable
          path: |
            ./publish-portable/ClipTyper-Portable.exe
            ./publish-portable/portable.marker

      - name: Upload Slim artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipTyper-Slim
          path: |
            ./publish-slim/ClipTyper-Slim.exe
            ./publish-slim/portable.marker

      - name: Upload Winget artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipTyper
          path: ./publish-winget/ClipTyper.exe

      # ── GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./publish-portable/ClipTyper-Portable.exe
            ./publish-portable/portable.marker
            ./publish-slim/ClipTyper-Slim.exe
            ./publish-winget/ClipTyper.exe
