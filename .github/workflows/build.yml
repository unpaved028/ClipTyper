name: Build & Release ClipTyper

on:
  push:
    tags:
      - 'v*'           # Triggers on version tags like v1.0.0
  workflow_dispatch:    # Allows manual trigger from GitHub UI

permissions:
  contents: write       # Needed to create releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file executable
        run: dotnet publish -c Release -r win-x64 --self-contained false -o ./publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipTyper
          path: ./publish/ClipTyper.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/ClipTyper.exe
          generate_release_notes: true
€ Framework-dependent build (requires .NET 8 runtime on target) â”€â”€
      - name: Publish framework-dependent
        run: >
          dotnet publish -c Release -r win-x64
          --self-contained false
          /p:PublishSingleFile=true
          -o ./publish-slim

      - name: Rename framework-dependent exe
        run: Rename-Item ./publish-slim/ClipTyper.exe ClipTyper-Slim.exe

      # â”€â”€ Upload artifacts (always available for download) â”€â”€
      - name: Upload self-contained artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipTyper-Portable
          path: ./publish-selfcontained/ClipTyper-Portable.exe

      - name: Upload framework-dependent artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipTyper-Slim
          path: ./publish-slim/ClipTyper-Slim.exe

      # â”€â”€ Create GitHub Release with both variants â”€â”€
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./publish-selfcontained/ClipTyper-Portable.exe
            ./publish-slim/ClipTyper-Slim.exe
          generate_release_notes: true
          body: |
            ## Downloads

            | Datei | Beschreibung | .NET Runtime nĂ¶tig? |
            |---|---|---|
            | **ClipTyper-Portable.exe** | EnthĂ¤lt die .NET Runtime â€“ lĂ¤uft sofort ĂĽberall | âťŚ Nein |
            | **ClipTyper-Slim.exe** | Kleinere Datei, benĂ¶tigt installierte .NET 8 Runtime | âś… Ja |

            > đź’ˇ **Unsicher?** Nimm **ClipTyper-Portable.exe** â€“ die funktioniert auf jedem Windows 10/11 (x64) ohne weitere Installation.
