name: Build & Release ClipTyper

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained
        run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishTrimmed=true /p:EnableCompressionInSingleFile=true -o ./publish-selfcontained

      - name: Rename self-contained exe
        run: Rename-Item ./publish-selfcontained/ClipTyper.exe ClipTyper-Portable.exe

      - name: Publish framework-dependent
        run: dotnet publish -c Release -r win-x64 --self-contained false /p:PublishSingleFile=true -o ./publish-slim

      - name: Rename framework-dependent exe
        run: Rename-Item ./publish-slim/ClipTyper.exe ClipTyper-Slim.exe

      - name: Upload self-contained artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipTyper-Portable
          path: ./publish-selfcontained/ClipTyper-Portable.exe

      - name: Upload framework-dependent artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipTyper-Slim
          path: ./publish-slim/ClipTyper-Slim.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./publish-selfcontained/ClipTyper-Portable.exe
            ./publish-slim/ClipTyper-Slim.exe
